name: deploy discord-util-bot

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-1
  AWS_ROLE_ARN: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsCdkRole

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: infra/package.json
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - name: Install dependencies
        working-directory: infra
        run: npm ci

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}

      - name: Deploy CDK Stack
        env:
          IMAGE_SHA_TAG: ${{ github.sha }}
        working-directory: infra
        run: |
          npx cdk deploy --all --require-approval never -c imageTag=$IMAGE_SHA_TAG
